<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Températures Paris</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 24px; }
    #chart { width: 100%; height: 520px; }
  </style>
</head>
<body>
  <h1>Températures horaires — Paris</h1>
  <div id="chart"></div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      const res = await fetch('/paris');
      const json = await res.json();

      const data = new google.visualization.DataTable();
      data.addColumn('datetime', 'Date/Heure');
      data.addColumn('number', 'Température (°C)');

      json.forEach(p => {
        const [datePart, timePart] = p.datetime.split('T');
        const [y, m, d] = datePart.split('-').map(Number);
        const [hh, mm] = timePart.split(':').map(Number);
        data.addRow([new Date(y, m-1, d, hh, mm), p.temperature_c]);
      });

      const options = {
        title: 'Température à Paris (horaire)',
        legend: { position: 'bottom' },
        hAxis: { title: 'Date/Heure', format: 'dd/MM HH:mm' },
        vAxis: { title: '°C' }
      };

      const chart = new google.visualization.LineChart(document.getElementById('chart'));
      chart.draw(data, options);
    }
  </script>
</body>
</html>
