<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Histogramme Paris</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 24px; }
    #chart { width: 100%; height: 520px; }
  </style>
</head>
<body>
  <h1>Températures — Paris (Histogramme)</h1>
  <div id="chart"></div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      const res = await fetch('/paris');
      const json = await res.json();

      const data = new google.visualization.DataTable();
      data.addColumn('string', 'Date/Heure');
      data.addColumn('number', 'Température (°C)');

      json.slice(0, 48).forEach(p => {
        data.addRow([p.datetime, p.temperature_c]);
      });

      const options = {
        title: 'Température à Paris (48h)',
        legend: { position: 'bottom' },
        hAxis: { title: 'Date/Heure' },
        vAxis: { title: '°C' },
        bar: { groupWidth: '80%' }
      };

      const chart = new google.visualization.ColumnChart(document.getElementById('chart'));
      chart.draw(data, options);
    }
  </script>
</body>
</html>
